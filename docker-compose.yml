name: nornikel-knowledge-graph

services:
  search-db:
    image: paradedb/paradedb:0.23.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mekg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mekg_search}
    ports:
      - "5433:5432"
    volumes:
      - search_db_data:/var/lib/postgresql
      - ./docker/search-db-init:/docker-entrypoint-initdb.d:ro
      - ./demo-seed/search-db.pgdump:/seed/search-db.pgdump:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - knowledge_graph

  neo4j-seed:
    image: neo4j:2026.05.0
    restart: "no"
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        if [ -f /data/databases/neo4j/neostore ]; then
          echo "Neo4j data volume is already initialized; seed restore skipped."
          exit 0
        fi
        /var/lib/neo4j/bin/neo4j-admin database load neo4j \
          --from-path=/seed \
          --overwrite-destination=true
        chown -R 7474:7474 /data /logs
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./demo-seed:/seed:ro
    networks:
      - knowledge_graph

  neo4j:
    image: neo4j:2026.05.0
    restart: unless-stopped
    depends_on:
      neo4j-seed:
        condition: service_completed_successfully
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test:
        - CMD-SHELL
        - cypher-shell -u neo4j -p "$${NEO4J_AUTH#*/}" "RETURN 1" >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - knowledge_graph

  backend:
    image: ghcr.io/rusti3/nornikel_hack/backend:latest
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_DATABASE: neo4j
      POSTGRES_HOST: search-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mekg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mekg_search}
    depends_on:
      search-db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_chunks:/code/chunks
      - backend_merged_files:/code/merged_files
      - backend_artifacts:/code/artifacts
      - "${CORPUS_PATH:-./demo-documents}:/corpus:ro"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()
      interval: 10s
      timeout: 6s
      retries: 30
      start_period: 45s
    networks:
      - knowledge_graph

  agent-worker:
    image: ghcr.io/rusti3/nornikel_hack/backend:latest
    restart: unless-stopped
    command: ["python", "-m", "src.mekg.agent_worker"]
    env_file:
      - ./.env
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_DATABASE: neo4j
      POSTGRES_HOST: search-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mekg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mekg_search}
    depends_on:
      search-db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - backend_artifacts:/code/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - knowledge_graph

  frontend:
    image: ghcr.io/rusti3/nornikel_hack/frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - knowledge_graph

networks:
  knowledge_graph:
    driver: bridge

volumes:
  search_db_data:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  backend_chunks:
  backend_merged_files:
  backend_artifacts:
